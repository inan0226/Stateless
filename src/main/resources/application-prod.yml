spring:
  config:
    import: aws-parameterstore:/stateless/prod/db/
  datasource:
    url: "${url}"
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: "${username}"
    password: "${password}"
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        show-sql: false
    hibernate:
      ddl-auto: validate
info:
  app:
    message: "${team}"
