logging:
  level:
    root: info

management:
  endpoints:
    web:
      exposure:
        include: health, info
  info:
    env:
      enabled: true

server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 10MB
  cloud:
    aws:
      s3:
        bucket: s3-stateless-inan-files
      region:
        static: ap-northeast-2
      credentials:
        instance-profile: true